server {
    listen 80;

    # Docker-internes DNS (127.0.0.11): Upstreams pro Request auflösen statt einmalig
    # beim Start einzufrieren. Sonst zeigt nginx nach einem Container-Neustart (Update,
    # `docker compose up -d`) weiter auf die TOTE alte IP des backend/frontend-Containers
    # → 502 auf /api (und die Login-Maske fällt aufs Test-Formular zurück), bis nginx
    # selbst neu startet. Mit Variable im proxy_pass + resolver löst nginx den Namen
    # zur Laufzeit auf und übersteht Container-Neustarts ohne nginx-Restart.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # API → Backend (strippt /api-Prefix, analog zum Vite-Dev-Proxy)
    location /api/ {
        # Variable erzwingt Laufzeit-Auflösung; das implizite /api-Strippen des
        # trailing-slash-proxy_pass entfällt dabei → per rewrite nachbilden.
        # set MUSS vor dem `rewrite … break` stehen (break stoppt sonst auch das set).
        set $upstream_backend backend;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://$upstream_backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE-Streaming: kein Buffering
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # Alles andere → SvelteKit-Frontend
    location / {
        set $upstream_frontend frontend;
        proxy_pass http://$upstream_frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
