server {
    listen 80;

    # Maximale Upload-Größe (Sicherheits-Audit #5): nginx-Default ist 1 MB und würde die
    # eigenen bis zu 10-MB-Uploads (/api/upload/session) am Proxy abweisen. 12m = 10 MB + Puffer.
    client_max_body_size 12m;

    # ── Security-Header (Sicherheits-Audit #5) ────────────────────────────────
    # Zentral hier gesetzt (nginx ist immer im Stack; ein vorgelagertes Caddy/TLS-Proxy
    # reicht sie durch). `always` → auch auf Fehlerantworten senden.
    #
    # HSTS: greift nur über HTTPS (der TLS-Terminierungspunkt liefert die Antwort). Bewusst
    # OHNE `includeSubDomains`/`preload` — sonst erzwänge es HTTPS für ALLE Subdomains der
    # Schuldomain (ggf. andere Dienste). Bei Bedarf ergänzen.
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Clickjacking-Schutz + Härtung, die das Laden von Skripten/Styles NICHT beeinflusst
    # (bricht die SPA nicht). Eine vollständige ressourcenbeschränkende CSP (default-src/
    # script-src …) muss gegen den gebauten Frontend-Build getestet werden — Vorlage unten.
    add_header Content-Security-Policy "frame-ancestors 'none'; base-uri 'self'; object-src 'none'; form-action 'self'" always;
    #
    # Vollständige CSP-Vorlage (erst nach Test aktivieren; ersetzt die Zeile oben):
    # add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; object-src 'none'; form-action 'self'" always;

    # Docker-internes DNS (127.0.0.11): Upstreams pro Request auflösen statt einmalig
    # beim Start einzufrieren. Sonst zeigt nginx nach einem Container-Neustart (Update,
    # `docker compose up -d`) weiter auf die TOTE alte IP des backend/frontend-Containers
    # → 502 auf /api (und die Login-Maske fällt aufs Test-Formular zurück), bis nginx
    # selbst neu startet. Mit Variable im proxy_pass + resolver löst nginx den Namen
    # zur Laufzeit auf und übersteht Container-Neustarts ohne nginx-Restart.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # API → Backend (strippt /api-Prefix, analog zum Vite-Dev-Proxy)
    location /api/ {
        # Variable erzwingt Laufzeit-Auflösung; das implizite /api-Strippen des
        # trailing-slash-proxy_pass entfällt dabei → per rewrite nachbilden.
        # set MUSS vor dem `rewrite … break` stehen (break stoppt sonst auch das set).
        set $upstream_backend backend;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://$upstream_backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE-Streaming: kein Buffering
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # Alles andere → SvelteKit-Frontend
    location / {
        set $upstream_frontend frontend;
        proxy_pass http://$upstream_frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
