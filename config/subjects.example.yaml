    name: Mathematik
    icon: square-radical
    color: "#3b82f6"
    min_grade: 5
    max_grade: 13
    sort_order: 10
    fach_code: M
    bildungsplan_overrides: # Klassen 5-6 haben V2-Fassung
      "5-6": ".V2"

