# Welcher Adapter aktiv ist: "oauth" oder "yaml_test"
adapter: yaml_test

oauth:
  base_url: https://iserv.example.de
  client_id: ggd-ki-plattform
  redirect_uri: https://ki.example.de/auth/callback
  # Regex mit Capture-Group für den Jahrgang.
  # Gruppe "jahrgang.10" → grade="10"
  grade_group_pattern: '^jahrgang\.(\d{1,2})$'
  # Zum Deaktivieren auskommentieren oder auf null setzen:
  # grade_group_pattern: null
  # client_secret kommt aus Env-Variable AUTH_ISERV_CLIENT_SECRET
  # Optionale URL-Overrides (Standard: aus base_url + IServ-Pfaden abgeleitet).
  # Nur setzen, wenn ein anderer OAuth2/OIDC-Provider verwendet wird:
  # auth_url: "https://sso.example.de/oauth2/authorize"
  # token_url: "https://sso.example.de/oauth2/token"
  # userinfo_url: "https://sso.example.de/oauth2/userinfo"

yaml_test:
  users_file: config/test_users.yaml

# SSO-Gruppen -> Plattform-Rollen
group_role_map:
  - group: ki-admins
    role: admin
  - group: lehrer
    role: teacher
  - group: schueler
    role: student

# SSO-Gruppenimport: Namensmuster für automatischen Gruppentyp-Zuordnung
# Jedes Muster muss genau eine Capture-Group enthalten (für Name-Ableitung).
sso:
  groups:
    subject_department: '^FS\.(.+)$'        # FS.Mathematik → subject_department
    school_class: '^Klasse\.(.+)$'          # Klasse.8a → school_class
    teaching_group: '^unterricht\.(.+)$'    # unterricht.8a.Mathematik → teaching_group
  allow_manual_teaching_groups: true   # false = Sidebar-Vorschläge deaktiviert
  subject_aliases:                     # Kurzname → Subject-Slug (case-insensitiv)
    D:    deutsch
    E:    englisch
    M:    mathematik
    Bio:  biologie
    Ch:   chemie
    Ph:   physik
