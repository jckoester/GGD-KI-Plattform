# Welcher Adapter aktiv ist: "oauth" oder "yaml_test"
adapter: yaml_test

oauth:
  base_url: https://iserv.example.de
  client_id: ggd-ki-plattform
  redirect_uri: https://ki.example.de/api/auth/callback
  # OAuth-Scopes. WICHTIG: IServ liefert die Gruppen-/Rollen-Claims NUR, wenn der
  # `groups`-Scope angefordert wird UND der OAuth-Client in IServ dafür
  # freigeschaltet ist (IServ → Verwaltung → OAuth-Clients → Scopes). Ohne
  # `groups` werden alle als `student` eingestuft (kein Rollen-/Fach-Match).
  scope: "openid profile email groups"
  # Regex mit Capture-Group für den Jahrgang.
  # Gruppe "jahrgang.10" → grade="10"
  grade_group_pattern: '^jahrgang\.(\d{1,2})$'
  # Zum Deaktivieren auskommentieren oder auf null setzen:
  # grade_group_pattern: null
  # client_secret kommt aus Env-Variable AUTH_ISERV_CLIENT_SECRET
  # Optionale URL-Overrides (Standard: aus base_url + IServ-Pfaden abgeleitet).
  # Nur setzen, wenn ein anderer OAuth2/OIDC-Provider verwendet wird:
  # auth_url: "https://sso.example.de/oauth2/authorize"
  # token_url: "https://sso.example.de/oauth2/token"
  # userinfo_url: "https://sso.example.de/oauth2/userinfo"

yaml_test:
  users_file: config/test_users.yaml

# SSO-Gruppen UND SSO-Rollen -> Plattform-Rollen.
# Beim Login matcht der OAuth-Adapter jeden `group:`-Eintrag CASE-INSENSITIV
# gegen die vom Provider gelieferten Gruppen (`groups`-Claim) UND Rollen
# (`roles`-Claim). IServ liefert die Rollen `Lehrer`, `Schüler`, `Administrator`;
# zusätzlich kann man schul-spezifische Gruppen (z. B. `Kollegium`) mappen.
# Die Schreibweise ist egal (`lehrer` trifft `Lehrer`). Greift kein Eintrag,
# fällt die Rolle auf `student` zurück (kein Login-Reject) — zur Diagnose zeigt
# das Profil die rohen SSO-Gruppen/-Rollen unter „SSO-Mitgliedschaften".
group_role_map:
  # Plattform-Admin (Budget/Statistik/Einstellungen/De-Anonymisierung): bewusst
  # eine EIGENE, kleine SSO-Gruppe — NICHT die IServ-Rolle `Administrator`, sonst
  # wären alle IT-Admins automatisch Plattform-Admins.
  - group: ki-admins
    role: admin
  # Lehrkräfte: IServ-Rolle `Lehrer` und/oder die Kollegiums-Gruppe.
  - group: lehrer
    role: teacher
  - group: Kollegium
    role: teacher
  # Schüler:innen: IServ-Rolle `Schüler` (ist zugleich der Default-Fallback).
  - group: schueler
    role: student
  # Krisen-Einsicht (4-Augen-Prinzip): Personen, die geflaggte Konversationen
  # mitfreigeben/einsehen dürfen — typischerweise Schulsozialarbeit/Beratung.
  # Die Rolle darf eigenständig vorkommen (ohne Lehrkraft-Rolle).
  - group: ki-reviewer
    role: review

# SSO-Gruppenimport: Namensmuster für automatischen Gruppentyp-Zuordnung
# Jedes Muster muss genau eine Capture-Group enthalten (für Name-Ableitung).
# Matching ist case-insensitiv: IServ liefert kleingeschriebene Accountnamen
# (z.B. fs.mathematik), die Muster dürfen aber Großpräfixe verwenden.
sso:
  groups:
    subject_department: '^FS\.(.+)$' # matcht fs.mathematik → subject_department
    school_class: '^Klasse\.(.+)$' # matcht klasse.8a → school_class
    teaching_group: '^unterricht\.(.+)$' # matcht unterricht.8a.mathematik → teaching_group
  allow_manual_teaching_groups: true # false = Sidebar-Vorschläge deaktiviert
  # Hinweis: Fach-Aliase (alternative SSO-Gruppennamen, z. B. fs.bildende.kunst → kunst)
  # werden pro Fach in config/subjects.yaml gepflegt (Feld sso_aliases) — nicht mehr hier.
