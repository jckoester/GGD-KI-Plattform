  # Fachschaft NwT (fs.nwt) betreut zwei eigenständige Fächer mit je eigenem BP:
  # NwT (G8) + NIT (G9-Nachfolger). NIT wächst von unten nach und läuft nie parallel
  # zu NwT (disjunkte Bänder, jährlich verschoben). NwT direkt, NIT per sso_aliases.
  - slug: nwt
    name: NwT
    icon: microscope
    color: "#0ea5e9"
    min_grade: 8
    max_grade: 12
    sort_order: 150

  - slug: nit
