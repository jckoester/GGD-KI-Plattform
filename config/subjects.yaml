# Fächer-Konfiguration
# Felder: slug (eindeutig, Kleinbuchstaben), name (Anzeigename), icon (Lucide-Name),
#         color (CSS-Farbe, z.B. #3b82f6), min_grade, max_grade, sort_order,
#         fach_code (optional, Bildungsplan-Fachkürzel wie M/CH; wird in die
#         subjects-Tabelle geseedet und löst #-Cross-Fach-Bezüge auf),
#         sso_aliases (optional, Liste alternativer SSO-Gruppennamen, die beim
#         Gruppenimport auf dieses Fach gemappt werden — z.B. [bildende.kunst]
#         für die IServ-Gruppe fs.bildende.kunst. Single Source of Truth statt
#         eines separaten Alias-Blocks in auth.yaml.)
#
schulart: GYM # Bildungsplan-Schulart (GYM, RS, GMS, GS, BSO)
schuljahr: "2026/27" # aktuelles Schuljahr

bildungsplan_default: # gilt für alle Fächer, wenn kein Override
  bp_basis: BP2016BW # Prefix; zukunftsoffen für BP2030
  suffix: "" # leer = Basisfassung; ".V2" = überarbeitete Fassung

subjects:
  - slug: mathematik
    name: Mathematik
    icon: square-radical
    color: "#3b82f6"
    min_grade: 5
    max_grade: 13
    sort_order: 10
    fach_code: M
    bildungsplan_overrides: # Klassen 5-6 haben V2-Fassung
      "5-6": ".V2"

  - slug: deutsch
    name: Deutsch
    icon: book-open
    color: "#ef4444"
    min_grade: 5
    max_grade: 13
    sort_order: 20
    # kein fach_code → BP-Import überspringt Deutsch

  - slug: englisch
    name: Englisch
    icon: globe
    color: "#10b981"
    min_grade: 5
    max_grade: 13
    sort_order: 30

  - slug: physik
    name: Physik
    icon: atom
    color: "#8b5cf6"
    min_grade: 7
    max_grade: 13
    sort_order: 40

  - slug: chemie
    name: Chemie
    icon: flask-conical
    color: "#f59e0b"
    min_grade: 8
    max_grade: 13
    sort_order: 50
    fach_code: CH # kein Override, Basisfassung für alle Stufen

  - slug: biologie
    name: Biologie
    icon: leaf
    color: "#22c55e"
    min_grade: 5
    max_grade: 13
    sort_order: 60

  - slug: geschichte
    name: Geschichte
    icon: landmark
    color: "#a78bfa"
    min_grade: 6
    max_grade: 13
    sort_order: 70

  - slug: geographie
    name: Geographie
    icon: map
    color: "#06b6d4"
    min_grade: 5
    max_grade: 13
    sort_order: 80

  # Fachschaft Informatik (fs.informatik) betreut ZWEI eigenständige Fächer mit
  # je eigenem Bildungsplan: IuM (Sek I) + Informatik (Kursstufe). Beide werden über
  # die Fachschaft aufgelöst — Informatik direkt (Slug=informatik), IuM per sso_aliases.
  - slug: ium
    name: IuM
    icon: code-2
    color: "#64748b"
    min_grade: 5
    max_grade: 10
    sort_order: 88
    sso_aliases: [informatik]   # IServ: fs.informatik

  - slug: informatik
    name: Informatik
    icon: code-2
    color: "#475569"
    min_grade: 11
    max_grade: 12
    sort_order: 90

  - slug: kunst
    name: Kunst
    icon: palette
    color: "#ec4899"
    min_grade: 5
    max_grade: 13
    sort_order: 100
    sso_aliases: [bildende.kunst]   # IServ: fs.bildende.kunst

  - slug: musik
    name: Musik
    icon: music
    color: "#f97316"
    min_grade: 5
    max_grade: 13
    sort_order: 110

  - slug: sport
    name: Sport
    icon: dumbbell
    color: "#14b8a6"
    min_grade: 5
    max_grade: 13
    sort_order: 120

  # Drei eigenständige konfessionelle Fächer mit je eigenem Bildungsplan.
