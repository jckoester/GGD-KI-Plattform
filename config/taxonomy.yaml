# Jede category hat: label_de, color (Semantic-Token-Kürzel), content_types[]
# Jeder content_type hat: key, label_de, scope_defaults (read_scope, write_scope),
#   optional: scope_anchor (true/false)

categories:

  document:
    label_de: "Dokument"
    color: "bl"
    content_types:
      - key: formatierungsvorlage
        label_de: "Formatierungsvorlage"
        scope_defaults: {read_scope: school,   write_scope: school  }
      - key: vokabelliste
        label_de: "Vokabelliste"
        scope_defaults: {read_scope: group,    write_scope: private }
      - key: aufgabenblatt
        label_de: "Aufgabenblatt"
        scope_defaults: {read_scope: group,    write_scope: private }
