        label_de: "Quelltext"
        scope_defaults: {read_scope: group,    write_scope: private }
      - key: konvention
        label_de: "Konvention"
        scope_defaults: {read_scope: school,   write_scope: school  }
        embedding: true
      - key: methodenblatt
        label_de: "Methodenblatt"
        scope_defaults: {read_scope: school,   write_scope: subject }
      - key: operatorenblatt
        label_de: "Operatorenblatt"
        scope_defaults: {read_scope: school,   write_scope: subject }
