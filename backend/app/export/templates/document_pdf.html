<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>{{ title }}</title>
<style>
  /* Standard-Vorlage der Material-Werkstatt (Phase 19). Schulweite/persönliche Vorlagen
     überschreiben dies später via extra_css (Schritt 6). */
  @page {
    size: A4;
    margin: 2cm 2cm 2.2cm 2cm;
    @bottom-center {
      content: counter(page) " / " counter(pages);
      font-family: "Liberation Sans", Arial, sans-serif;
      font-size: 9pt;
      color: #666;
    }
  }
  html { font-size: 11pt; }
  body {
    font-family: "Liberation Sans", Arial, sans-serif;
    color: #111;
    line-height: 1.45;
    margin: 0;
  }
  h1 { font-size: 1.7em; margin: 0 0 0.6em; }
  h2 { font-size: 1.35em; margin: 1.2em 0 0.4em; border-bottom: 1px solid #ddd; padding-bottom: 2px; }
  h3 { font-size: 1.15em; margin: 1em 0 0.3em; }
  p { margin: 0.5em 0; }
  ul, ol { margin: 0.5em 0 0.5em 1.4em; padding: 0; }
  li { margin: 0.2em 0; }
  blockquote {
    margin: 0.6em 0; padding: 0.2em 0.9em;
    border-left: 3px solid #bbb; color: #444;
  }
  code {
    font-family: "Liberation Mono", "Courier New", monospace;
    font-size: 0.92em; background: #f2f2f2; padding: 0.05em 0.3em; border-radius: 3px;
  }
  pre {
    background: #f6f6f6; padding: 0.7em 0.9em; border-radius: 4px;
    overflow-wrap: break-word; white-space: pre-wrap; font-size: 0.9em;
  }
  pre code { background: none; padding: 0; }
  table { border-collapse: collapse; margin: 0.8em 0; width: 100%; }
  th, td { border: 1px solid #ccc; padding: 0.35em 0.55em; text-align: left; vertical-align: top; }
  th { background: #f0f0f0; }
  img, svg { max-width: 100%; height: auto; }
  a { color: #1a4b8c; text-decoration: none; }
  h1, h2, h3 { page-break-after: avoid; }
  table, pre, blockquote { page-break-inside: avoid; }
  {{ extra_css|safe }}
</style>
</head>
<body>
{% if title %}<h1>{{ title }}</h1>{% endif %}
{{ body_html|safe }}
</body>
</html>
