services:

  db:
    image: pgvector/pgvector:pg16
    env_file: .env
    environment:
      POSTGRES_DB: ggd_ki
      POSTGRES_USER: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    env_file: .env
    environment:
      AUTH_CONFIG_PATH: /app/config/auth.yaml
      BUDGET_TIERS_PATH: /app/config/budget_tiers.yaml
      TAXONOMY_PATH: /app/config/taxonomy.yaml
    volumes:
      - ./config:/app/config:ro
      - ./static:/app/static:ro
    depends_on:
      db:
        condition: service_healthy
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        PUBLIC_SCHOOL_NAME: ${PUBLIC_SCHOOL_NAME:-ki@schule}
        PUBLIC_SCHOOL_LOGO_URL: ${PUBLIC_SCHOOL_LOGO_URL:-}
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  cron:
    build: ./backend
    env_file: .env
    environment:
      AUTH_CONFIG_PATH: /app/config/auth.yaml
      BUDGET_TIERS_PATH: /app/config/budget_tiers.yaml
      TAXONOMY_PATH: /app/config/taxonomy.yaml
    volumes:
      - ./config:/app/config:ro
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "printenv >> /etc/environment &&
             echo '0 2 * * * root python /app/scripts/cleanup_inactive_accounts.py >> /proc/1/fd/1 2>&1' > /etc/cron.d/ggd-ki &&
             echo '30 2 * * * root python /app/scripts/cleanup_stale_conversations.py >> /proc/1/fd/1 2>&1' >> /etc/cron.d/ggd-ki &&
             echo '0 6 1 * * root python /app/scripts/refresh_ecb_rate.py >> /proc/1/fd/1 2>&1' >> /etc/cron.d/ggd-ki &&
             echo '0 7 1 * * root python /app/scripts/monthly_budget_reconcile.py >> /proc/1/fd/1 2>&1' >> /etc/cron.d/ggd-ki &&
             echo '15 3 * * * root python /app/scripts/embedding_backfill.py >> /proc/1/fd/1 2>&1' >> /etc/cron.d/ggd-ki &&
             chmod 0644 /etc/cron.d/ggd-ki &&
             cron -f"
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
