services:

  db:
    image: pgvector/pgvector:pg16
    env_file: .env
    environment:
      POSTGRES_DB: ggd_ki
      POSTGRES_USER: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    env_file: .env
    environment:
      AUTH_CONFIG_PATH: /app/config/auth.yaml
      BUDGET_TIERS_PATH: /app/config/budget_tiers.yaml
      TAXONOMY_PATH: /app/config/taxonomy.yaml
      SCHOOL_YEAR_PATH: /app/config/school_year.yaml
      # Server-Rendering (Phase 17): interner Sidecar für CircuiTikZ/Mathe (Chat + PDF).
      RENDER_SIDECAR_URL: http://render-sidecar:3200
      # matplotlib (Plot-Rendering) braucht ein schreibbares Verzeichnis für den Font-Cache.
      MPLCONFIGDIR: /tmp/matplotlib
      # Persistente Ablage generierter Bilder (Phase 16) + Bibliotheks-Artefakte (Phase 18).
      # Absolute Pfade → cwd-unabhängig; das ./data-Volume teilen backend + cron.
      IMAGE_STORAGE_DIR: /app/data/generated_images
      ARTIFACT_STORAGE_DIR: /app/data/artifacts
    volumes:
      - ./config:/app/config:ro
      - ./static:/app/static:ro
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
      render-sidecar:
        condition: service_started
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # Server-Render-Sidecar (Phase 17): CircuiTikZ (node-tikzjax) + MathJax → SVG.
  # KEIN `ports:` — nur intern im Compose-Netz erreichbar, nie öffentlich.
  render-sidecar:
    build: ./render-sidecar
    environment:
      RENDER_SIDECAR_HOST: 0.0.0.0
      RENDER_SIDECAR_PORT: "3200"
      RENDER_POOL_SIZE: ${RENDER_POOL_SIZE:-2}
      RENDER_TIMEOUT_MS: ${RENDER_TIMEOUT_MS:-10000}
    healthcheck:
      # node:slim hat kein curl → Health-Check über node selbst.
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3200/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        PUBLIC_SCHOOL_NAME: ${PUBLIC_SCHOOL_NAME:-ki@schule}
        PUBLIC_SCHOOL_LOGO_URL: ${PUBLIC_SCHOOL_LOGO_URL:-}
        PUBLIC_SCHOOL_LOGO_URL_LIGHT: ${PUBLIC_SCHOOL_LOGO_URL_LIGHT:-}
        PUBLIC_SCHOOL_LOGO_URL_DARK: ${PUBLIC_SCHOOL_LOGO_URL_DARK:-}
        PUBLIC_STUDENT_GRADES: ${PUBLIC_STUDENT_GRADES:-[5,6,7,8,9,10,11,12]}
        PUBLIC_PERIODS: ${PUBLIC_PERIODS:-[1,2,3,4,5,6,7,8]}
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      # Host-Port konfigurierbar (z.B. hinter einem vorgelagerten Reverse-Proxy);
      # Container-Port bleibt 80. Setzen über NGINX_PORT in .env, Default 80.
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  cron:
    build: ./backend
    env_file: .env
    environment:
      AUTH_CONFIG_PATH: /app/config/auth.yaml
      BUDGET_TIERS_PATH: /app/config/budget_tiers.yaml
      TAXONOMY_PATH: /app/config/taxonomy.yaml
      SCHOOL_YEAR_PATH: /app/config/school_year.yaml
      # Muss zu backend passen (dasselbe ./data-Volume) — sonst räumt der Cron ins Leere.
      IMAGE_STORAGE_DIR: /app/data/generated_images
      ARTIFACT_STORAGE_DIR: /app/data/artifacts
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "printenv >> /etc/environment &&
             echo '0 2 * * * root python /app/scripts/cleanup_inactive_accounts.py >> /proc/1/fd/1 2>&1' > /etc/cron.d/ggd-ki &&
             echo '30 2 * * * root python /app/scripts/cleanup_stale_conversations.py >> /proc/1/fd/1 2>&1' >> /etc/cron.d/ggd-ki &&
             echo '0 6 1 * * root python /app/scripts/refresh_ecb_rate.py >> /proc/1/fd/1 2>&1' >> /etc/cron.d/ggd-ki &&
             echo '0 7 1 * * root python /app/scripts/monthly_budget_reconcile.py >> /proc/1/fd/1 2>&1' >> /etc/cron.d/ggd-ki &&
             echo '15 3 * * * root python /app/scripts/embedding_backfill.py >> /proc/1/fd/1 2>&1' >> /etc/cron.d/ggd-ki &&
             echo '45 3 * * * root python /app/scripts/auto_confirm_reviews.py >> /proc/1/fd/1 2>&1' >> /etc/cron.d/ggd-ki &&
             echo '0 4 * * * root python /app/scripts/cleanup_rendered_svg.py >> /proc/1/fd/1 2>&1' >> /etc/cron.d/ggd-ki &&
             echo '30 4 * * * root python /app/scripts/cleanup_generated_images.py >> /proc/1/fd/1 2>&1' >> /etc/cron.d/ggd-ki &&
             echo '45 4 * * * root python /app/scripts/cleanup_artifacts.py >> /proc/1/fd/1 2>&1' >> /etc/cron.d/ggd-ki &&
             chmod 0644 /etc/cron.d/ggd-ki &&
             cron -f"
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
